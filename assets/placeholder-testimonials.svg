<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#1A1A1A"/>
  <!-- Grid of video call participants -->
  <rect x="40" y="40" width="280" height="210" rx="8" fill="#222"/>
  <rect x="340" y="40" width="280" height="210" rx="8" fill="#222"/>
  <rect x="640" y="40" width="280" height="210" rx="8" fill="#222"/>
  <rect x="40" y="270" width="280" height="210" rx="8" fill="#222"/>
  <rect x="340" y="270" width="280" height="210" rx="8" fill="#222"/>
  <rect x="640" y="270" width="280" height="210" rx="8" fill="#222"/>
  <!-- Participant avatars -->
  <circle cx="180" cy="120" r="30" fill="#2A2A2A"/>
  <circle cx="480" cy="120" r="30" fill="#2A2A2A"/>
  <circle cx="780" cy="120" r="30" fill="#2A2A2A"/>
  <circle cx="180" cy="350" r="30" fill="#2A2A2A"/>
  <circle cx="480" cy="350" r="30" fill="#2A2A2A"/>
  <circle cx="780" cy="350" r="30" fill="#2A2A2A"/>
  <!-- Name tags -->
  <rect x="130" y="170" width="100" height="16" rx="8" fill="#D97757" opacity="0.2"/>
  <rect x="430" y="170" width="100" height="16" rx="8" fill="#D97757" opacity="0.2"/>
  <rect x="730" y="170" width="100" height="16" rx="8" fill="#D97757" opacity="0.2"/>
  <rect x="130" y="400" width="100" height="16" rx="8" fill="#D97757" opacity="0.2"/>
  <rect x="430" y="400" width="100" height="16" rx="8" fill="#D97757" opacity="0.2"/>
  <rect x="730" y="400" width="100" height="16" rx="8" fill="#D97757" opacity="0.2"/>
  <text x="480" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#555">Participantes en clase virtual</text>
</svg>
